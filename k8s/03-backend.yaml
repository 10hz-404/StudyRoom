apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-room-user
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: study-room-user
  template:
    metadata:
      labels:
        app: study-room-user
    spec:
      containers:
      - name: study-room-user
        image: study-room-user:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "local"
        - name: SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MYSQL_URL
          value: "jdbc:mysql://studyroom-mysql:3306/study_room?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8&useUnicode=true"
        - name: SPRING_DATA_REDIS_HOST
          value: "studyroom-redis"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
          value: "studyroom-nacos:8848"
---
apiVersion: v1
kind: Service
metadata:
  name: study-room-user-service
  namespace: default
spec:
  selector:
    app: study-room-user
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
---
