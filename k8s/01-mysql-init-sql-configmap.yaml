apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql-config
  namespace: default
data:
  01-schema.sql: |
    -- ============================================================
    -- 校园自习室预约系统 — MySQL 8.0 建表脚本
    -- 数据库名称: study_room
    -- 版本: V1.0 | 日期: 2026-06-17
    -- ============================================================

    CREATE DATABASE IF NOT EXISTS study_room
      DEFAULT CHARACTER SET utf8mb4
      DEFAULT COLLATE utf8mb4_unicode_ci;

    USE study_room;

    -- -----------------------------------------------------------
    -- 1. 用户表 (user)
    -- 存储系统用户，含学生和管理员
    -- -----------------------------------------------------------
    CREATE TABLE `user` (
      `id`          BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '用户ID',
      `student_no`  VARCHAR(20)  NOT NULL                 COMMENT '学号/工号，登录账号',
      `name`        VARCHAR(50)  NOT NULL                 COMMENT '姓名',
      `password`    VARCHAR(200) NOT NULL                 COMMENT 'BCrypt加密后的密码密文',
      `role`        VARCHAR(10)  NOT NULL DEFAULT 'STUDENT' COMMENT '角色: STUDENT/ADMIN',
      `status`      VARCHAR(10)  NOT NULL DEFAULT 'ACTIVE'  COMMENT '状态: ACTIVE/DISABLED',
      `create_time` DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      `update_time` DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
      PRIMARY KEY (`id`),
      UNIQUE INDEX `uk_student_no` (`student_no`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='用户表';

    -- -----------------------------------------------------------
    -- 2. 自习室表 (study_room)
    -- 存储自习室基本信息
    -- -----------------------------------------------------------
    CREATE TABLE `study_room` (
      `id`          BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '自习室ID',
      `room_name`   VARCHAR(100) NOT NULL                 COMMENT '自习室名称',
      `location`    VARCHAR(200) NOT NULL                 COMMENT '位置描述（如：图书馆3楼A区）',
      `status`      VARCHAR(10)  NOT NULL DEFAULT 'ACTIVE'  COMMENT '状态: ACTIVE/DISABLED',
      `create_time` DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      `update_time` DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
      PRIMARY KEY (`id`),
      INDEX `idx_room_status` (`status`)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='自习室表';

    -- -----------------------------------------------------------
    -- 3. 座位表 (seat)
    -- 存储每个自习室内的座位信息
    -- -----------------------------------------------------------
    CREATE TABLE `seat` (
      `id`          BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '座位ID',
      `room_id`     BIGINT       NOT NULL                 COMMENT '所属自习室ID',
      `seat_no`     VARCHAR(20)  NOT NULL                 COMMENT '座位编号（如：A-001）',
      `status`      VARCHAR(15)  NOT NULL DEFAULT 'AVAILABLE' COMMENT '座位状态: AVAILABLE/OCCUPIED/MAINTENANCE',
      `create_time` DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      PRIMARY KEY (`id`),
      UNIQUE INDEX `uk_room_seat` (`room_id`, `seat_no`),
      INDEX `idx_room_status` (`room_id`, `status`),
      CONSTRAINT `fk_seat_room` FOREIGN KEY (`room_id`) REFERENCES `study_room`(`id`) ON DELETE CASCADE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='座位表';

    -- -----------------------------------------------------------
    -- 4. 预约表 (reservation) — 系统核心表
    -- 存储学生预约记录，座位冲突检测的核心表
    -- -----------------------------------------------------------
    CREATE TABLE `reservation` (
      `id`           BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '预约ID',
      `user_id`      BIGINT       NOT NULL                 COMMENT '预约用户ID',
      `seat_id`      BIGINT       NOT NULL                 COMMENT '预约座位ID',
      `reserve_date` DATE         NOT NULL                 COMMENT '预约日期',
      `start_time`   TIME         NOT NULL                 COMMENT '预约开始时间',
      `end_time`     TIME         NOT NULL                 COMMENT '预约结束时间',
      `status`       VARCHAR(20)  NOT NULL DEFAULT 'ACTIVE'  COMMENT '预约状态: ACTIVE/CHECKED_IN/COMPLETED/CANCELLED/NO_SHOW',
      `create_time`  DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      `update_time`  DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
      PRIMARY KEY (`id`),
      INDEX `idx_seat_date_time` (`seat_id`, `reserve_date`, `start_time`, `end_time`),
      INDEX `idx_reserve_date_status` (`reserve_date`, `status`),
      INDEX `idx_user_date` (`user_id`, `reserve_date`),
      CONSTRAINT `fk_reserve_user` FOREIGN KEY (`user_id`) REFERENCES `user`(`id`) ON DELETE CASCADE,
      CONSTRAINT `fk_reserve_seat` FOREIGN KEY (`seat_id`) REFERENCES `seat`(`id`) ON DELETE CASCADE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='预约表';

    -- -----------------------------------------------------------
    -- 5. 考勤表 (attendance)
    -- 存储签到/签退记录，与预约一对一
    -- -----------------------------------------------------------
    CREATE TABLE `attendance` (
      `id`              BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '考勤ID',
      `reservation_id`  BIGINT       NOT NULL                 COMMENT '关联预约ID（唯一）',
      `check_in_time`   DATETIME     DEFAULT NULL             COMMENT '签到时间',
      `check_out_time`  DATETIME     DEFAULT NULL             COMMENT '签退时间',
      `status`          VARCHAR(20)  NOT NULL DEFAULT 'NOT_CHECKED_IN' COMMENT '考勤状态: NOT_CHECKED_IN/CHECKED_IN/CHECKED_OUT/ABNORMAL',
      `create_time`     DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      `update_time`     DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
      PRIMARY KEY (`id`),
      UNIQUE INDEX `uk_reservation` (`reservation_id`),
      INDEX `idx_att_status` (`status`),
      CONSTRAINT `fk_att_reserve` FOREIGN KEY (`reservation_id`) REFERENCES `reservation`(`id`) ON DELETE CASCADE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='考勤表';

    -- -----------------------------------------------------------
    -- 6. 违规表 (violation)
    -- 存储系统自动生成的违规记录
    -- -----------------------------------------------------------
    CREATE TABLE `violation` (
      `id`              BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '违规ID',
      `user_id`         BIGINT       NOT NULL                 COMMENT '违规用户ID',
      `reservation_id`  BIGINT       NOT NULL                 COMMENT '关联预约ID',
      `violation_type`  VARCHAR(20)  NOT NULL                 COMMENT '违规类型: NO_SHOW（未签到）/ NO_CHECKOUT（未签退）',
      `status`          VARCHAR(15)  NOT NULL DEFAULT 'PENDING' COMMENT '处理状态: PENDING/PROCESSED/DISMISSED',
      `process_remark`  VARCHAR(500) DEFAULT NULL             COMMENT '管理员处理备注',
      `create_time`     DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      `update_time`     DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
      PRIMARY KEY (`id`),
      UNIQUE INDEX `uk_user_reserve_type` (`user_id`, `reservation_id`, `violation_type`),
      INDEX `idx_violation_status` (`status`, `create_time`),
      INDEX `idx_violation_user` (`user_id`, `create_time`),
      CONSTRAINT `fk_vio_user` FOREIGN KEY (`user_id`) REFERENCES `user`(`id`) ON DELETE CASCADE,
      CONSTRAINT `fk_vio_reserve` FOREIGN KEY (`reservation_id`) REFERENCES `reservation`(`id`) ON DELETE CASCADE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='违规表';

    -- -----------------------------------------------------------
    -- 7. 用户偏好表 (user_preference) — AI 扩展表①
    -- 存储用户历史偏好，供大模型推荐使用
    -- -----------------------------------------------------------
    CREATE TABLE `user_preference` (
      `id`                BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '偏好ID',
      `user_id`           BIGINT       NOT NULL                 COMMENT '用户ID',
      `prefer_room_id`    BIGINT       DEFAULT NULL             COMMENT '偏好的自习室ID',
      `prefer_time_period` VARCHAR(20) DEFAULT NULL             COMMENT '偏好时段: MORNING/AFTERNOON/EVENING',
      `prefer_quiet_level` TINYINT      DEFAULT NULL             COMMENT '安静偏好等级: 1~5',
      `total_reservations` INT          NOT NULL DEFAULT 0       COMMENT '累计预约次数（用于行为分析）',
      `updated_time`      DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '最后更新时间',
      PRIMARY KEY (`id`),
      UNIQUE INDEX `uk_user_pref` (`user_id`),
      CONSTRAINT `fk_pref_user` FOREIGN KEY (`user_id`) REFERENCES `user`(`id`) ON DELETE CASCADE,
      CONSTRAINT `fk_pref_room` FOREIGN KEY (`prefer_room_id`) REFERENCES `study_room`(`id`) ON DELETE SET NULL
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='用户偏好表（AI扩展）';

    -- -----------------------------------------------------------
    -- 8. AI 分析日志表 (ai_analysis_log) — AI 扩展表②
    -- 同时承载：推荐结果存储 + 异常分析记录 + 用户行为快照
    -- -----------------------------------------------------------
    CREATE TABLE `ai_analysis_log` (
      `id`              BIGINT       NOT NULL AUTO_INCREMENT  COMMENT '日志ID',
      `biz_type`        VARCHAR(30)  NOT NULL                 COMMENT '业务类型: RECOMMEND/ANALYSIS/BEHAVIOR',
      `biz_id`          BIGINT       DEFAULT NULL             COMMENT '关联业务记录ID（预约ID/违规ID等）',
      `user_id`         BIGINT       DEFAULT NULL             COMMENT '关联用户ID',
      `analysis_type`   VARCHAR(50)  NOT NULL                 COMMENT '分析子类型: ROOM_RECOMMEND/ANOMALY_CHECKIN/ANOMALY_CHECKOUT/USER_CLICK/USER_SEARCH/USER_CANCEL',
      `input_snapshot`  JSON         DEFAULT NULL             COMMENT 'AI输入快照（JSON格式，含候选自习室/学生偏好/时间上下文等）',
      `result_snapshot` JSON         DEFAULT NULL             COMMENT 'AI输出快照（JSON格式，含推荐排序/异常原因/处理建议等）',
      `model`           VARCHAR(50)  DEFAULT NULL             COMMENT '调用的大模型名称（如：DeepSeek-V3）',
      `latency_ms`      INT          DEFAULT NULL             COMMENT 'API调用耗时（毫秒）',
      `create_time`     DATETIME     NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
      PRIMARY KEY (`id`),
      INDEX `idx_log_biz_type` (`biz_type`, `create_time`),
      INDEX `idx_log_user` (`user_id`, `create_time`),
      INDEX `idx_log_analysis_type` (`analysis_type`, `create_time`),
      CONSTRAINT `fk_log_user` FOREIGN KEY (`user_id`) REFERENCES `user`(`id`) ON DELETE SET NULL
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='AI分析日志表（AI扩展：推荐结果+异常分析+行为记录）';

