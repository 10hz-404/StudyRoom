server:
  port: 8080

spring:
  application:
    name: study-room-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-route
          uri: lb://study-room-user
          predicates:
            - Path=/api/v1/auth/**
        - id: room-route
          uri: lb://study-room-room
          predicates:
            - Path=/api/v1/rooms/**, /api/v1/seats/**
        - id: reservation-route
          uri: lb://study-room-reservation
          predicates:
            - Path=/api/v1/reservations/**, /api/v1/attendance/**
        - id: violation-route
          uri: lb://study-room-violation
          predicates:
            - Path=/api/v1/violations/**
        - id: ai-route
          uri: lb://study-room-ai
          predicates:
            - Path=/api/v1/recommendations/**, /api/v1/ai/**
