server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
  port: 8082

spring:
  application:
    name: study-room-room
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: jdbc:mysql://localhost:3306/study_room?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8&useUnicode=true
          driver-class-name: com.mysql.cj.jdbc.Driver
          username: root
          password: root123
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: info
    org.mybatis.spring: info
    org.apache.ibatis: info
