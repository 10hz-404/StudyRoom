server:
  servlet:
    encoding:
      charset: UTF-8
      force: true

  port: 8080

spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  datasource:
    dynamic:
      primary: mysql
      datasource:
        mysql:
          url: jdbc:mysql://localhost:3306/study_room?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8&useUnicode=true
          driver-class-name: com.mysql.cj.jdbc.Driver
          username: root
          password: root123

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: info
    org.mybatis.spring: info
    org.apache.ibatis: info
    com.studyroom.mapper: info

knife4j:
  enable: true
  setting:
    language: zh_cn

# ============================================================
# DeepSeek AI 智能助手 API KEY
# 申请地址: https://platform.deepseek.com/api_keys
# ============================================================
deepseek:
  api-key: ${DEEPSEEK_API_KEY:your_api_key_here}
  base-url: https://api.deepseek.com
  model: deepseek-chat
